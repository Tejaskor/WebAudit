# Render.com blueprint — deploy the Website Audit Tool as a Docker web service.
# Usage: push to GitHub, then in Render: New + → Blueprint → pick this repo.
services:
  - type: web
    name: webaudit
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/google-chrome-stable
      # Optional: enhanced performance data from Google PageSpeed Insights.
      # Set the value in the Render dashboard (kept secret).
      - key: PAGESPEED_API_KEY
        sync: false
